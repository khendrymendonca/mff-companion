{% extends "base.html" %}

{% block content %}
<div class="flex flex-col md:flex-row gap-8">
    <!-- Seletor de Andar -->
    <div class="w-full md:w-1/3">
        <h2 class="text-2xl font-black italic uppercase mb-6 tracking-tight">Mapeamento da Torre</h2>
        <div class="space-y-3 max-h-[70vh] overflow-y-auto pr-2 custom-scrollbar">
            {% for floor in floors %}
            <button onclick="selectFloor({{ floor.number }}, '{{ floor.name }}', {{ floor.requirements | tojson | safe }})" 
                    class="w-full text-left card-bg p-4 rounded-lg border border-slate-700 hover:marvel-border hover:border transition flex justify-between items-center group">
                <div>
                    <span class="text-slate-500 font-black text-xs uppercase mr-2">F{{ floor.number }}</span>
                    <span class="font-bold text-sm">{{ floor.name }}</span>
                </div>
                <i class="fa-solid fa-chevron-right text-xs text-slate-600 group-hover:text-white transition"></i>
            </button>
            {% endfor %}
            <div class="p-4 text-center text-slate-500 italic text-xs">
                Mais andares sendo mapeados...
            </div>
        </div>
    </div>

    <!-- Recomendações -->
    <div class="w-full md:w-2/3" id="recommendation-panel">
        <div id="welcome-message" class="h-full flex flex-col items-center justify-center text-center p-12 border-2 border-dashed border-slate-700 rounded-2xl">
            <i class="fa-solid fa-crosshairs text-6xl text-slate-700 mb-4"></i>
            <h3 class="text-xl font-bold text-slate-400 italic">Selecione um andar para ver as recomendações táticas.</h3>
        </div>

        <div id="results-panel" class="hidden">
            <div class="flex justify-between items-center mb-6">
                <div>
                    <h2 id="selected-floor-title" class="text-3xl font-black italic uppercase tracking-tight">Andar X</h2>
                    <p id="selected-floor-reqs" class="text-marvel-red font-black uppercase text-xs tracking-widest mt-1">REQUISITOS: ???</p>
                </div>
                <div class="bg-slate-800 px-3 py-1 rounded text-[10px] font-black uppercase">RECOMENDAÇÃO TÁTICA</div>
            </div>

            <div id="character-grid" class="grid grid-cols-2 lg:grid-cols-3 gap-4">
                <!-- Personagens injetados via JS -->
            </div>
        </div>
    </div>
</div>

<script>
    // Inventário passado pelo servidor (simplificado para o JS)
    const inventory = {{ inventory | tojson | safe }};

    function selectFloor(num, name, reqs) {
        document.getElementById('welcome-message').classList.add('hidden');
        document.getElementById('results-panel').classList.remove('hidden');
        
        document.getElementById('selected-floor-title').innerText = `F${num} - ${name}`;
        
        let reqText = [];
        if (reqs.type) reqText.push(`TIPO: ${reqs.type}`);
        if (reqs.alignment) reqText.push(`ALINHAMENTO: ${reqs.alignment}`);
        document.getElementById('selected-floor-reqs').innerText = reqText.join(' | ') || 'SEM RESTRIÇÕES';

        const grid = document.getElementById('character-grid');
        grid.innerHTML = '';

        // Filtrar e Ordenar (Lógica do Recommender no lado do cliente para interatividade)
        const recommended = inventory.filter(char => {
            if (reqs.type && char.base_type !== reqs.type && char.base_type !== 'Universal') return false;
            if (reqs.alignment && char.base_alignment !== reqs.alignment) return false;
            return true;
        }).sort((a, b) => {
            const tiers = { 'T1': 1, 'T2': 2, 'Transcended': 3, 'T3': 4, 'T4': 5 };
            return tiers[a.current_tier] - tiers[b.current_tier]; // Crescente: usar os fracos primeiro
        });

        if (recommended.length === 0) {
            grid.innerHTML = '<div class="col-span-full p-8 text-center text-slate-500 italic">Nenhum personagem apto encontrado no seu inventário.</div>';
            return;
        }

        recommended.forEach(char => {
            const card = document.createElement('div');
            card.className = 'card-bg rounded-lg p-4 border border-slate-700 flex flex-col items-center text-center hover:scale-105 transition cursor-pointer';
            card.innerHTML = `
                <div class="w-16 h-16 rounded-full bg-slate-800 flex items-center justify-center mb-3">
                    <i class="fa-solid fa-user-ninja text-2xl text-slate-600"></i>
                </div>
                <h4 class="font-bold text-sm mb-1">${char.name}</h4>
                <div class="flex gap-2">
                    <span class="text-[9px] font-black uppercase px-1.5 py-0.5 rounded bg-black/40">${char.current_tier}</span>
                    <span class="text-[9px] font-black uppercase px-1.5 py-0.5 rounded bg-marvel-red/20 text-marvel-red">${char.base_type}</span>
                </div>
            `;
            grid.appendChild(card);
        });
    }
</script>

<style>
    .custom-scrollbar::-webkit-scrollbar { width: 4px; }
    .custom-scrollbar::-webkit-scrollbar-track { background: #0f172a; }
    .custom-scrollbar::-webkit-scrollbar-thumb { background: #334155; border-radius: 10px; }
    .custom-scrollbar::-webkit-scrollbar-thumb:hover { background: #e23636; }
</style>
{% endblock %}
