<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MFF Companion - Shadowland Master</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Roboto:wght@400;700;900&display=swap');
        body { font-family: 'Roboto', sans-serif; background-color: #0f172a; color: #f8fafc; }
        .marvel-red { background-color: #e23636; }
        .marvel-border { border-color: #e23636; }
        .card-bg { background-color: #1e293b; }
    </style>
</head>
<body class="min-h-screen">
    <nav class="marvel-red p-4 shadow-lg sticky top-0 z-50">
        <div class="container mx-auto flex justify-between items-center">
            <h1 class="text-2xl font-black italic tracking-tighter">MFF COMPANION</h1>
            <div class="space-x-6 font-bold uppercase text-sm">
                <a href="/" class="hover:text-black transition">Dashboard</a>
                <a href="/gallery" class="hover:text-black transition">Galeria</a>
                <a href="/shadowland" class="hover:text-black transition">Shadowland</a>
                <a href="/settings" class="hover:text-black transition"><i class="fa-solid fa-gear"></i></a>
            </div>
        </div>
    </nav>
    <main class="container mx-auto p-6">
        {% block content %}{% endblock %}
    </main>
    <footer class="p-8 text-center text-slate-500 text-sm">
        <p>© 2026 MFF Companion - Desenvolvido para Comandantes da Netmarble</p>
    </footer>
</body>
</html>
